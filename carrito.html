<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiendaTech - Carrito</title>
</head>
<body>
    <header class="header">
        <h1 class="logo">TiendaTech</h1>
        <nav class="nav">
            <a href="index.html" class="nav-link">Catálogo</a>
            <a href="carrito.html" class="nav-link nav-link-activo">
                Carrito
                <span id="contador-carrito" class="contador">0</span>
            </a>
        </nav>
    </header>

    <main class="contenido">
        <h2 class="titulo-seccion">Tu carrito</h2>

        <!-- Se muestra solo si el carrito está vacío -->
        <p id="carrito-vacio" class="carrito-vacio">
            Tu carrito está vacío. ¡Agregá productos desde el catálogo!
        </p>

        <div id="carrito-container" class="carrito-lista">
            <!-- Acá se insertan dinámicamente los productos del carrito -->
        </div>

        <div class="carrito-resumen">
            <h3 id="total-carrito" class="total">Total: $0</h3>
            <div class="carrito-acciones">
                <button id="btn-vaciar" class="btn btn-secundario">Vaciar carrito</button>
                <button id="btn-finalizar" class="btn btn-primario">Finalizar compra</button>
            </div>
        </div>
    </main>

</body>
</html>
